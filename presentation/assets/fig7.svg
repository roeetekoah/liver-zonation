<svg viewBox="0 0 540 214" xmlns="http://www.w3.org/2000/svg" width="540" height="214">
  <!-- three panels of cells -->
  <!-- A: healthy ordered gradient -->
  <rect x="14" y="26" width="156" height="120" rx="8" fill="#f7f9fa" stroke="#d7dde3"/>
  <text x="92" y="20" font-family="Arial" font-size="9.5" font-weight="700" fill="#16545c" text-anchor="middle">healthy</text>
  <g>
    <circle cx="44" cy="56" r="9" fill="#2f7fbf"/><circle cx="76" cy="56" r="9" fill="#86b3da"/><circle cx="108" cy="56" r="9" fill="#e6a877"/><circle cx="140" cy="56" r="9" fill="#c0651f"/>
    <circle cx="44" cy="86" r="9" fill="#2f7fbf"/><circle cx="76" cy="86" r="9" fill="#86b3da"/><circle cx="108" cy="86" r="9" fill="#e6a877"/><circle cx="140" cy="86" r="9" fill="#c0651f"/>
    <circle cx="44" cy="116" r="9" fill="#2f7fbf"/><circle cx="76" cy="116" r="9" fill="#86b3da"/><circle cx="108" cy="116" r="9" fill="#e6a877"/><circle cx="140" cy="116" r="9" fill="#c0651f"/>
  </g>
  <text x="92" y="162" font-family="Arial" font-size="8" fill="#39505a" text-anchor="middle">clean gradient — readable</text>

  <!-- B: de-zonation, expression muddled -->
  <rect x="192" y="26" width="156" height="120" rx="8" fill="#f7f9fa" stroke="#d7dde3"/>
  <text x="270" y="20" font-family="Arial" font-size="9.5" font-weight="700" fill="#16545c" text-anchor="middle">de-zonation</text>
  <g fill="#8a8f96">
    <circle cx="222" cy="56" r="9"/><circle cx="254" cy="56" r="9"/><circle cx="286" cy="56" r="9"/><circle cx="318" cy="56" r="9"/>
    <circle cx="222" cy="86" r="9"/><circle cx="254" cy="86" r="9"/><circle cx="286" cy="86" r="9"/><circle cx="318" cy="86" r="9"/>
    <circle cx="222" cy="116" r="9"/><circle cx="254" cy="116" r="9"/><circle cx="286" cy="116" r="9"/><circle cx="318" cy="116" r="9"/>
  </g>
  <text x="270" y="156" font-family="Arial" font-size="8.5" font-weight="700" fill="#2e7d52" text-anchor="middle">&#10003; expression muddled</text>
  <text x="270" y="168" font-family="Arial" font-size="8" fill="#39505a" text-anchor="middle">&rarr; WE DETECT this</text>

  <!-- C: spatial scramble, expression intact -->
  <rect x="370" y="26" width="156" height="120" rx="8" fill="#f7f9fa" stroke="#d7dde3"/>
  <text x="448" y="20" font-family="Arial" font-size="9.5" font-weight="700" fill="#16545c" text-anchor="middle">spatial scramble</text>
  <g>
    <circle cx="400" cy="56" r="9" fill="#c0651f"/><circle cx="432" cy="56" r="9" fill="#2f7fbf"/><circle cx="464" cy="56" r="9" fill="#c0651f"/><circle cx="496" cy="56" r="9" fill="#2f7fbf"/>
    <circle cx="400" cy="86" r="9" fill="#2f7fbf"/><circle cx="432" cy="86" r="9" fill="#c0651f"/><circle cx="464" cy="86" r="9" fill="#2f7fbf"/><circle cx="496" cy="86" r="9" fill="#c0651f"/>
    <circle cx="400" cy="116" r="9" fill="#c0651f"/><circle cx="432" cy="116" r="9" fill="#2f7fbf"/><circle cx="464" cy="116" r="9" fill="#c0651f"/><circle cx="496" cy="116" r="9" fill="#2f7fbf"/>
  </g>
  <text x="448" y="156" font-family="Arial" font-size="8.5" font-weight="700" fill="#b03a2e" text-anchor="middle">&#10007; identities intact, positions lost</text>
  <text x="448" y="168" font-family="Arial" font-size="8" fill="#39505a" text-anchor="middle">&rarr; INVISIBLE to snRNA</text>
</svg>