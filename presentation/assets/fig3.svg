<svg viewBox="0 0 560 214" xmlns="http://www.w3.org/2000/svg" width="560" height="214">
  <!-- left puzzle piece: Paper 2 (the ruler) -->
  <path d="M20,28 H236 V92 a16,16 0 0 1 0,32 V188 H20 Z" fill="#e7f2f3" stroke="#16545c" stroke-width="2"/>
  <text x="128" y="50" font-size="12" font-weight="700" text-anchor="middle" fill="#0e3a40" font-family="Arial">Paper 2 — the ruler</text>
  <text x="128" y="68" font-size="9.5" text-anchor="middle" fill="#39505a" font-family="Arial">healthy spatial atlas</text>
  <!-- gradient bar = has position -->
  <defs><linearGradient id="pcg" x1="0" x2="1"><stop offset="0" stop-color="#f0c247"/><stop offset="1" stop-color="#3b7fd1"/></linearGradient></defs>
  <rect x="46" y="92" width="164" height="16" rx="3" fill="url(#pcg)" stroke="#16545c" stroke-width="1"/>
  <text x="46" y="124" font-size="8" text-anchor="start" fill="#39505a" font-family="Arial">portal</text>
  <text x="210" y="124" font-size="8" text-anchor="end" fill="#39505a" font-family="Arial">central</text>
  <text x="128" y="150" font-size="9" text-anchor="middle" fill="#16545c" font-weight="700" font-family="Arial">HAS position</text>
  <text x="128" y="168" font-size="8.5" text-anchor="middle" fill="#b03a2e" font-family="Arial">but healthy only</text>

  <!-- right puzzle piece: Paper 1 (the cells) with matching notch -->
  <path d="M324,28 H540 V188 H324 V124 a16,16 0 0 0 0,-32 Z" fill="#fdeede" stroke="#9a3412" stroke-width="2"/>
  <text x="432" y="50" font-size="12" font-weight="700" text-anchor="middle" fill="#7a2a0c" font-family="Arial">Paper 1 — the cells</text>
  <text x="432" y="68" font-size="9.5" text-anchor="middle" fill="#5a4030" font-family="Arial">69k disease nuclei, all stages</text>
  <!-- scattered dots = no position -->
  <g fill="#c05621">
    <circle cx="360" cy="92" r="3"/><circle cx="392" cy="104" r="3"/><circle cx="372" cy="118" r="3"/>
    <circle cx="420" cy="90" r="3"/><circle cx="448" cy="110" r="3"/><circle cx="410" cy="124" r="3"/>
    <circle cx="476" cy="96" r="3"/><circle cx="500" cy="116" r="3"/><circle cx="460" cy="128" r="3"/>
    <circle cx="386" cy="88" r="3"/><circle cx="438" cy="126" r="3"/><circle cx="498" cy="92" r="3"/>
  </g>
  <text x="432" y="150" font-size="9" text-anchor="middle" fill="#9a3412" font-weight="700" font-family="Arial">HAS disease spectrum</text>
  <text x="432" y="168" font-size="8.5" text-anchor="middle" fill="#b03a2e" font-family="Arial">but position destroyed</text>

  <!-- the decode arrow joining the tab into the notch -->
  <text x="280" y="100" font-size="8.5" text-anchor="middle" fill="#0e3a40" font-family="Arial">decode</text>
  <path d="M250,108 H310" stroke="#0e3a40" stroke-width="2" marker-end="url(#ar)"/>
  <defs><marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#0e3a40"/></marker></defs>
</svg>