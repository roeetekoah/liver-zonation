<svg viewBox="0 0 540 232" xmlns="http://www.w3.org/2000/svg" width="540" height="232">
  <!-- PANEL A: two example probability vectors -->
  <text x="140" y="20" font-family="Arial" font-size="9.5" font-weight="700" fill="#16545c" text-anchor="middle">per-cell zone probabilities</text>
  <line x1="48" y1="170" x2="250" y2="170" stroke="#9fb0b6" stroke-width="1"/>
  <!-- healthy peaked: central .92 mid .06 portal .02 -->
  <rect x="60" y="87" width="16" height="83" fill="#c0651f"/><rect x="78" y="165" width="16" height="5" fill="#caa78f"/><rect x="96" y="168" width="16" height="2" fill="#caa78f"/>
  <text x="86" y="185" font-family="Arial" font-size="8" fill="#33404a" text-anchor="middle">healthy cell</text>
  <text x="86" y="196" font-family="Arial" font-size="7.5" fill="#5a6472" text-anchor="middle">peaked &rarr; entropy &asymp; 0.2</text>
  <!-- diseased flat: .40 .35 .25 -->
  <rect x="166" y="134" width="16" height="36" fill="#8a8f96"/><rect x="184" y="138" width="16" height="32" fill="#8a8f96"/><rect x="202" y="147" width="16" height="23" fill="#8a8f96"/>
  <text x="192" y="185" font-family="Arial" font-size="8" fill="#33404a" text-anchor="middle">de-zonated cell</text>
  <text x="192" y="196" font-family="Arial" font-size="7.5" fill="#5a6472" text-anchor="middle">flat &rarr; entropy &asymp; 1.1</text>
  <text x="149" y="216" font-family="Arial" font-size="7.5" fill="#9aa3aa" text-anchor="middle">bars = P(portal), P(mid), P(central)</text>

  <!-- PANEL B: mean entropy rising across stages -->
  <text x="410" y="20" font-family="Arial" font-size="9.5" font-weight="700" fill="#16545c" text-anchor="middle">mean entropy by stage (the meter)</text>
  <line x1="312" y1="170" x2="520" y2="170" stroke="#9fb0b6" stroke-width="1"/>
  <text x="300" y="60" font-family="Arial" font-size="8" fill="#5a6472" text-anchor="end" transform="rotate(-90 300 110)">mean entropy &rarr;</text>
  <!-- bars: rising -->
  <g>
    <rect x="324" y="138" width="26" height="32" fill="#cfe6e9"/><text x="337" y="183" font-family="Arial" font-size="7.5" fill="#33404a" text-anchor="middle">Healthy</text>
    <rect x="362" y="120" width="26" height="50" fill="#bfdde1"/><text x="375" y="183" font-family="Arial" font-size="7.5" fill="#33404a" text-anchor="middle">NAFLD</text>
    <rect x="400" y="100" width="26" height="70" fill="#ead9cf"/><text x="413" y="183" font-family="Arial" font-size="7.5" fill="#33404a" text-anchor="middle">NASH</text>
    <rect x="438" y="83" width="26" height="87" fill="#fbe0cf"/><text x="451" y="183" font-family="Arial" font-size="7.5" fill="#33404a" text-anchor="middle">Cirrhosis</text>
    <rect x="476" y="68" width="26" height="102" fill="#f6c9b4"/><text x="489" y="183" font-family="Arial" font-size="7.5" fill="#33404a" text-anchor="middle">End-stage</text>
  </g>
  <path d="M337,134 L375,116 L413,96 L451,79 L489,64" fill="none" stroke="#c05621" stroke-width="2"/>
</svg>