<svg viewBox="0 0 640 256" xmlns="http://www.w3.org/2000/svg" width="640" height="256">
  <rect x="255" y="80" width="160" height="100" rx="14" fill="#16545c"/>
  <text x="335" y="120" font-size="20" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold">LIVER</text>
  <text x="335" y="140" font-size="9" text-anchor="middle" fill="#cfeef1" font-family="Arial">hepatocytes in lobules</text>
  <text x="335" y="155" font-size="8" text-anchor="middle" fill="#9fe0e6" font-family="Arial">(zoom: Fig. 2)</text>
  <!-- inputs -->
  <rect x="18" y="55" width="118" height="40" rx="7" fill="#fff" stroke="#c0392b" stroke-width="1.3"/>
  <text x="77" y="73" font-size="10" text-anchor="middle" fill="#c0392b" font-family="Arial" font-weight="bold">Aorta</text>
  <text x="77" y="87" font-size="7.5" text-anchor="middle" fill="#7a8690" font-family="Arial">(from heart)</text>
  <rect x="18" y="150" width="130" height="54" rx="7" fill="#fff" stroke="#8e44ad" stroke-width="1.3"/>
  <text x="83" y="172" font-size="10" text-anchor="middle" fill="#8e44ad" font-family="Arial" font-weight="bold">Gut &middot; spleen</text>
  <text x="83" y="188" font-size="10" text-anchor="middle" fill="#8e44ad" font-family="Arial" font-weight="bold">&middot; pancreas</text>
  <line x1="136" y1="80" x2="252" y2="108" stroke="#c0392b" stroke-width="4"/>
  <polygon points="252,108 240,103 242,114" fill="#c0392b"/>
  <text x="150" y="42" font-size="9" fill="#c0392b" font-family="Arial">Hepatic artery — O₂-rich (~25%)</text>
  <line x1="148" y1="176" x2="252" y2="158" stroke="#8e44ad" stroke-width="5"/>
  <polygon points="252,158 240,153 241,164" fill="#8e44ad"/>
  <text x="100" y="230" font-size="9" fill="#8e44ad" font-family="Arial">Portal vein — nutrient-rich, low O₂ (~75%)</text>
  <!-- outputs -->
  <line x1="415" y1="112" x2="538" y2="90" stroke="#2c6fb0" stroke-width="4"/>
  <polygon points="538,90 526,86 528,97" fill="#2c6fb0"/>
  <rect x="540" y="70" width="92" height="40" rx="7" fill="#fff" stroke="#2c6fb0" stroke-width="1.3"/>
  <text x="586" y="88" font-size="10" text-anchor="middle" fill="#2c6fb0" font-family="Arial" font-weight="bold">Heart</text>
  <text x="586" y="101" font-size="7.5" text-anchor="middle" fill="#7a8690" font-family="Arial">(blood out)</text>
  <text x="430" y="74" font-size="9" fill="#2c6fb0" font-family="Arial">Hepatic vein</text>
  <line x1="415" y1="160" x2="536" y2="190" stroke="#2f855a" stroke-width="4"/>
  <polygon points="536,190 524,185 525,196" fill="#2f855a"/>
  <rect x="518" y="188" width="120" height="44" rx="7" fill="#fff" stroke="#2f855a" stroke-width="1.3"/>
  <text x="578" y="207" font-size="9" text-anchor="middle" fill="#2f855a" font-family="Arial" font-weight="bold">Gallbladder + gut</text>
  <text x="578" y="221" font-size="7.5" text-anchor="middle" fill="#7a8690" font-family="Arial">(bile out)</text>
  <text x="420" y="245" font-size="9" fill="#2f855a" font-family="Arial">Bile duct — flows opposite to blood</text>
</svg>